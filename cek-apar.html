<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Status APAR Saya</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧯</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f6f2;
    --bg3: #eeede8;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #a8a8a3;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.22);
    --red: #E24B4A;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --amber: #BA7517;
    --amber-bg: #FAEEDA;
    --amber-text: #854F0B;
    --green: #3B6D11;
    --green-bg: #EAF3DE;
    --green-text: #3B6D11;
    --r: 12px;
    --rlg: 18px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252522;
      --bg3: #2a2a27;
      --text: #f0efeb;
      --text2: #9c9b97;
      --text3: #6b6b67;
      --border: rgba(255,255,255,0.09);
      --border2: rgba(255,255,255,0.20);
      --red-bg: #3d1515;
      --red-text: #f09595;
      --amber-bg: #3a2a08;
      --amber-text: #FAC775;
      --green-bg: #1a2e08;
      --green-text: #C0DD97;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 40px 20px 32px;
    text-align: center;
  }
  .hero-icon {
    width: 64px; height: 64px;
    background: var(--red);
    border-radius: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
  }
  .hero-icon i { color: white; font-size: 34px; }
  .hero h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  .hero p  { font-size: 15px; color: var(--text2); max-width: 440px; margin: 0 auto; line-height: 1.6; }

  /* SEARCH CARD */
  .search-section { max-width: 560px; margin: -1px auto 0; padding: 28px 20px 0; }
  .search-card {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--rlg);
    padding: 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .search-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; font-size: 12px; }
  .input-group { display: flex; gap: 10px; }
  .input-wrap {
    flex: 1;
    display: flex; align-items: center; gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 14px;
    transition: border-color .15s;
  }
  .input-wrap:focus-within { border-color: var(--red); box-shadow: 0 0 0 3px rgba(226,75,74,.1); }
  .input-wrap i { color: var(--text3); font-size: 18px; flex-shrink: 0; }
  .input-wrap input {
    background: none; border: none; outline: none;
    font-size: 15px; color: var(--text); width: 100%;
  }
  .input-wrap input::placeholder { color: var(--text3); }
  .btn-cek {
    background: var(--red); color: white; border: none;
    border-radius: 10px; padding: 10px 20px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    white-space: nowrap; display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .btn-cek:hover { opacity: .88; }
  .search-hint { font-size: 13px; color: var(--text3); margin-top: 10px; text-align: center; }

  /* RESULT */
  .result-section { max-width: 560px; margin: 0 auto; padding: 20px 20px 40px; }

  /* STATUS HERO CARD */
  .status-hero {
    border-radius: var(--rlg);
    padding: 28px 24px;
    text-align: center;
    margin-bottom: 16px;
    border: 1px solid transparent;
  }
  .status-hero.aman   { background: var(--green-bg); border-color: rgba(59,109,17,.2); }
  .status-hero.hampir { background: var(--amber-bg); border-color: rgba(186,117,23,.2); }
  .status-hero.lewat  { background: var(--red-bg);   border-color: rgba(226,75,74,.25); }

  .status-icon {
    width: 72px; height: 72px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 14px; font-size: 36px;
  }
  .aman   .status-icon { background: var(--green-bg); color: var(--green); border: 2px solid rgba(59,109,17,.3); }
  .hampir .status-icon { background: var(--amber-bg); color: var(--amber); border: 2px solid rgba(186,117,23,.3); }
  .lewat  .status-icon { background: var(--red-bg);   color: var(--red);   border: 2px solid rgba(226,75,74,.3); }

  .status-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .aman   .status-title { color: var(--green-text); }
  .hampir .status-title { color: var(--amber-text); }
  .lewat  .status-title { color: var(--red-text); }

  .status-sub { font-size: 14px; line-height: 1.6; }
  .aman   .status-sub { color: var(--green-text); opacity: .8; }
  .hampir .status-sub { color: var(--amber-text); opacity: .85; }
  .lewat  .status-sub { color: var(--red-text);   opacity: .85; }

  /* PROGRESS RING */
  .ring-wrap { margin: 16px auto 0; width: 100px; position: relative; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-label {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; line-height: 1;
  }
  .ring-label small { font-size: 11px; font-weight: 400; opacity: .7; margin-top: 2px; }

  /* DETAIL CARD */
  .detail-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .detail-card-title {
    padding: 12px 16px;
    font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    color: var(--text3);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .detail-rows { }
  .detail-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row i { font-size: 17px; color: var(--text3); flex-shrink: 0; margin-top: 1px; }
  .detail-label { color: var(--text2); font-size: 13px; min-width: 120px; flex-shrink: 0; }
  .detail-val { font-weight: 500; }

  /* DATE COUNTDOWN */
  .countdown-strip {
    display: flex; gap: 10px; justify-content: center;
    margin-top: 12px;
  }
  .countdown-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px; text-align: center; min-width: 64px;
  }
  .countdown-num { font-size: 24px; font-weight: 700; line-height: 1; }
  .countdown-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* CTA CARD */
  .cta-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 18px 20px;
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 12px;
  }
  .cta-icon { font-size: 28px; flex-shrink: 0; }
  .cta-text h3 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
  .cta-text p  { font-size: 13px; color: var(--text2); }
  .cta-btn {
    margin-left: auto; flex-shrink: 0;
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .cta-btn.green  { background: #16a34a; color: white; }
  .cta-btn.green:hover { background: #15803d; }
  .cta-btn.red    { background: var(--red); color: white; }
  .cta-btn.red:hover { opacity: .88; }

  /* NOT FOUND */
  .not-found {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--rlg);
    padding: 40px 24px;
    text-align: center;
    color: var(--text2);
  }
  .not-found i { font-size: 48px; display: block; margin-bottom: 14px; color: var(--text3); }
  .not-found h3 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .not-found p  { font-size: 14px; line-height: 1.7; }

  /* MULTIPLE RESULTS */
  .multi-list { }
  .multi-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
    display: flex; align-items: center; gap: 14px;
  }
  .multi-item:hover { border-color: var(--red); box-shadow: 0 2px 12px rgba(226,75,74,.1); }
  .multi-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .multi-info { flex: 1; }
  .multi-name { font-weight: 600; font-size: 15px; }
  .multi-addr { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .multi-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; flex-shrink: 0; }

  /* FOOTER */
  .page-footer {
    text-align: center; padding: 16px 20px 32px;
    font-size: 12px; color: var(--text3); line-height: 1.6;
  }
  .page-footer a { color: var(--text2); text-decoration: underline; }

  @media (max-width: 480px) {
    .hero h1 { font-size: 22px; }
    .input-group { flex-direction: column; }
    .btn-cek { width: 100%; justify-content: center; }
    .detail-label { min-width: 100px; }
    .countdown-strip { gap: 7px; }
    .countdown-box { min-width: 54px; padding: 8px 10px; }
    .cta-card { flex-wrap: wrap; }
    .cta-btn { margin-left: 0; width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-icon"><i class="ti ti-fire-extinguisher"></i></div>
  <h1>Cek Status APAR Saya</h1>
  <p>Masukkan nomor telepon yang terdaftar saat pembelian untuk melihat status isi ulang APAR kamu.</p>
</div>

<!-- SEARCH -->
<div class="search-section">
  <div class="search-card">
    <h2>Cari Data APAR</h2>
    <div class="input-group">
      <div class="input-wrap">
        <i class="ti ti-phone"></i>
        <input type="tel" id="input-telp" placeholder="Masukkan nomor telepon kamu..."
          onkeydown="if(event.key==='Enter')doSearch()">
      </div>
      <button class="btn-cek" onclick="doSearch()"><i class="ti ti-search"></i> Cek</button>
    </div>
    <p class="search-hint">Contoh: 0812xxxxxxxx &nbsp;·&nbsp; Nomor yang didaftarkan saat beli APAR</p>
  </div>
</div>

<!-- RESULT -->
<div class="result-section" id="result-section" style="display:none"></div>

<!-- FOOTER -->
<div class="page-footer" id="page-footer">
  Data bersumber dari sistem APAR Reminder &nbsp;·&nbsp; Kontak kami jika ada pertanyaan
</div>

<script>
const STORE_KEY = 'apar_reminder_v2';

// ── CONFIG: ganti info kontak toko/perusahaan kamu di sini ──
const KONTAK = {
  nama:  'Tim APAR Kami',
  telp:  '08xxxxxxxx',       // nomor WhatsApp bisnis kamu
  label: 'Hubungi Kami'
};
// ────────────────────────────────────────────────────────────

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
  catch(e) { return []; }
}

function normPhone(s) {
  return String(s||'').replace(/\D/g,'').replace(/^62/,'0').replace(/^0+/,'0');
}

function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }

function dueDate(tgl, interval) {
  const d = new Date(tgl);
  d.setFullYear(d.getFullYear() + parseInt(interval));
  return d;
}

function daysLeft(due) {
  return Math.ceil((new Date(due) - today()) / (1000*60*60*24));
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
}

function progressOf(tgl, interval) {
  const start = new Date(tgl).getTime();
  const end   = dueDate(tgl, interval).getTime();
  const now   = today().getTime();
  return Math.max(0, Math.min(100, (now - start) / (end - start) * 100));
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── BUILD RING SVG ──
function ringHTML(pct, color, textColor) {
  const r = 40, cx = 50, cy = 50;
  const circ = 2 * Math.PI * r;
  const dash  = circ * Math.min(pct / 100, 1);
  const label = pct >= 100 ? '100%' : Math.round(pct) + '%';
  return `<div class="ring-wrap">
    <svg width="100" height="100" viewBox="0 0 100 100">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(0,0,0,0.07)" stroke-width="9"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="9"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
    </svg>
    <div class="ring-label" style="color:${textColor}">
      <span>${label}</span>
      <small>terpakai</small>
    </div>
  </div>`;
}

// ── COUNTDOWN STRIP ──
function countdownHTML(days) {
  const abs  = Math.abs(days);
  const th   = Math.floor(abs / 365);
  const bln  = Math.floor((abs % 365) / 30);
  const hr   = abs % 30;
  return `<div class="countdown-strip">
    <div class="countdown-box"><div class="countdown-num">${th}</div><div class="countdown-lbl">Tahun</div></div>
    <div class="countdown-box"><div class="countdown-num">${bln}</div><div class="countdown-lbl">Bulan</div></div>
    <div class="countdown-box"><div class="countdown-num">${hr}</div><div class="countdown-lbl">Hari</div></div>
  </div>`;
}

// ── RENDER SINGLE RESULT ──
function renderResult(d) {
  const due  = dueDate(d.tgl, d.interval);
  const days = daysLeft(due);
  const pct  = progressOf(d.tgl, d.interval);

  let cls, icon, title, sub, ringColor, ringText;
  if (days < 0) {
    cls = 'lewat'; icon = 'ti-alert-triangle'; ringColor = '#E24B4A'; ringText = '#A32D2D';
    title = 'APAR Sudah Expired!';
    sub   = `Masa berlaku habis ${Math.abs(days)} hari yang lalu. Segera lakukan isi ulang untuk keselamatan.`;
  } else if (days === 0) {
    cls = 'lewat'; icon = 'ti-alert-circle'; ringColor = '#E24B4A'; ringText = '#A32D2D';
    title = 'Jatuh Tempo Hari Ini!';
    sub   = 'Masa berlaku APAR berakhir hari ini. Segera hubungi kami untuk pengisian ulang.';
  } else if (days <= 30) {
    cls = 'hampir'; icon = 'ti-alert'; ringColor = '#BA7517'; ringText = '#854F0B';
    title = 'Segera Isi Ulang';
    sub   = `Masa berlaku akan habis dalam ${days} hari lagi. Jadwalkan isi ulang sekarang.`;
  } else {
    cls = 'aman'; icon = 'ti-circle-check'; ringColor = '#3B6D11'; ringText = '#3B6D11';
    title = 'APAR Masih Berlaku';
    sub   = `Masih berlaku hingga ${fmtDate(due)}.`;
  }

  const waNum = KONTAK.telp.replace(/\D/g,'').replace(/^0/,'62');
  const waMsg = encodeURIComponent(
    `Halo, saya ${esc(d.nama)} ingin menjadwalkan isi ulang APAR di "${esc(d.alamat)}". ${days <= 0 ? 'APAR saya sudah expired.' : `Masa berlaku habis ${fmtDate(due)}.`} Mohon informasi lebih lanjut. Terima kasih.`
  );

  return `
    <div class="status-hero ${cls}">
      <div class="status-icon"><i class="ti ${icon}"></i></div>
      <div class="status-title">${title}</div>
      <div class="status-sub">${sub}</div>
      ${ringHTML(pct, ringColor, ringText)}
      ${days > 0 ? `<div style="margin-top:14px;font-size:13px;opacity:.75">${days <= 0 ? 'Lewat' : 'Sisa'} waktu:</div>${countdownHTML(days)}` : ''}
    </div>

    <div class="detail-card">
      <div class="detail-card-title">Data APAR Kamu</div>
      <div class="detail-rows">
        <div class="detail-row">
          <i class="ti ti-user"></i>
          <span class="detail-label">Nama</span>
          <span class="detail-val">${esc(d.nama)}</span>
        </div>
        <div class="detail-row">
          <i class="ti ti-map-pin"></i>
          <span class="detail-label">Lokasi APAR</span>
          <span class="detail-val">${esc(d.alamat)}</span>
        </div>
        <div class="detail-row">
          <i class="ti ti-phone"></i>
          <span class="detail-label">Nomor Telepon</span>
          <span class="detail-val">${esc(d.telp)}</span>
        </div>
        ${d.jenis ? `<div class="detail-row">
          <i class="ti ti-flame"></i>
          <span class="detail-label">Jenis APAR</span>
          <span class="detail-val">${esc(d.jenis)}${d.kapasitas ? ' · ' + esc(d.kapasitas) : ''}</span>
        </div>` : ''}
        ${d.seri ? `<div class="detail-row">
          <i class="ti ti-barcode"></i>
          <span class="detail-label">No. Seri</span>
          <span class="detail-val">${esc(d.seri)}</span>
        </div>` : ''}
        <div class="detail-row">
          <i class="ti ti-calendar"></i>
          <span class="detail-label">Tanggal Beli</span>
          <span class="detail-val">${fmtDate(d.tgl)}</span>
        </div>
        <div class="detail-row">
          <i class="ti ti-refresh"></i>
          <span class="detail-label">Interval Isi Ulang</span>
          <span class="detail-val">Setiap ${d.interval} tahun</span>
        </div>
        <div class="detail-row">
          <i class="ti ti-calendar-due"></i>
          <span class="detail-label">Jatuh Tempo</span>
          <span class="detail-val" style="color:${days<=0?'var(--red)':days<=30?'var(--amber)':'inherit'};font-weight:600">
            ${fmtDate(due)}
          </span>
        </div>
        ${d.catatan ? `<div class="detail-row">
          <i class="ti ti-notes"></i>
          <span class="detail-label">Catatan</span>
          <span class="detail-val">${esc(d.catatan)}</span>
        </div>` : ''}
      </div>
    </div>

    ${(days <= 30) ? `
    <div class="cta-card" style="border-color:${days<=0?'rgba(226,75,74,.3)':'rgba(186,117,23,.25)'}">
      <div class="cta-icon">🧯</div>
      <div class="cta-text">
        <h3>${days <= 0 ? 'Jadwalkan Isi Ulang Sekarang' : 'Segera Jadwalkan Isi Ulang'}</h3>
        <p>${days <= 0 ? 'APAR yang expired tidak bisa diandalkan saat darurat.' : `Jangan tunggu hingga habis masa berlaku.`}</p>
      </div>
      <a href="https://wa.me/${waNum}?text=${waMsg}" target="_blank" class="cta-btn ${days<=0?'red':'green'}">
        <i class="ti ti-brand-whatsapp"></i> WhatsApp
      </a>
    </div>` : `
    <div class="cta-card">
      <div class="cta-icon">💬</div>
      <div class="cta-text">
        <h3>Ada Pertanyaan?</h3>
        <p>Hubungi kami kapan saja untuk informasi lebih lanjut tentang APAR kamu.</p>
      </div>
      <a href="https://wa.me/${waNum}?text=${encodeURIComponent('Halo, saya ingin bertanya tentang APAR saya. Terima kasih.')}" target="_blank" class="cta-btn green">
        <i class="ti ti-brand-whatsapp"></i> Hubungi Kami
      </a>
    </div>`}

    <div style="text-align:center;margin-top:18px">
      <button onclick="resetSearch()" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--text2);text-decoration:underline;padding:6px 0">
        ← Cek nomor lain
      </button>
    </div>
  `;
}

// ── RENDER MULTIPLE ──
function renderMultiple(items) {
  const cards = items.map(d => {
    const due  = dueDate(d.tgl, d.interval);
    const days = daysLeft(due);
    let dot, badgeCls, badgeTxt;
    if (days <= 0)   { dot = '#E24B4A'; badgeCls = 'background:var(--red-bg);color:var(--red-text)';   badgeTxt = days < 0 ? `Lewat ${Math.abs(days)} hari` : 'Hari ini'; }
    else if (days <= 30) { dot = '#BA7517'; badgeCls = 'background:var(--amber-bg);color:var(--amber-text)'; badgeTxt = `${days} hari lagi`; }
    else             { dot = '#3B6D11'; badgeCls = 'background:var(--green-bg);color:var(--green-text)'; badgeTxt = 'Masih aman'; }
    return `<div class="multi-item" onclick="showSingle('${d.id}')">
      <div class="multi-dot" style="background:${dot}"></div>
      <div class="multi-info">
        <div class="multi-name">${esc(d.nama)}</div>
        <div class="multi-addr"><i class="ti ti-map-pin" style="font-size:12px"></i> ${esc(d.alamat)}</div>
      </div>
      <span class="multi-badge" style="${badgeCls}">${badgeTxt}</span>
    </div>`;
  }).join('');

  return `
    <div style="font-size:14px;color:var(--text2);margin-bottom:14px">
      Ditemukan <strong>${items.length} APAR</strong> dengan nomor tersebut. Pilih APAR yang ingin dicek:
    </div>
    <div class="multi-list">${cards}</div>
    <div style="text-align:center;margin-top:14px">
      <button onclick="resetSearch()" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--text2);text-decoration:underline;padding:6px 0">
        ← Cari nomor lain
      </button>
    </div>
  `;
}

// ── SEARCH ──
let currentData = [];
function doSearch() {
  const raw   = document.getElementById('input-telp').value.trim();
  const query = normPhone(raw);
  if (!query || query.length < 5) {
    document.getElementById('input-telp').focus();
    return;
  }

  const all    = loadData();
  const found  = all.filter(d => normPhone(d.telp) === query || normPhone(d.telp).endsWith(query.slice(-8)));
  currentData  = found;

  const sec = document.getElementById('result-section');
  sec.style.display = 'block';
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });

  if (!found.length) {
    sec.innerHTML = `<div class="not-found">
      <i class="ti ti-search-off"></i>
      <h3>Data Tidak Ditemukan</h3>
      <p>Nomor <strong>${esc(raw)}</strong> tidak terdaftar dalam sistem kami.<br>
      Pastikan nomor yang dimasukkan sama dengan nomor saat pembelian,<br>atau hubungi kami untuk bantuan.</p>
      <div style="margin-top:20px">
        <button onclick="resetSearch()" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--text2);text-decoration:underline">← Coba nomor lain</button>
      </div>
    </div>`;
    return;
  }

  if (found.length === 1) {
    sec.innerHTML = renderResult(found[0]);
  } else {
    sec.innerHTML = renderMultiple(found);
  }
}

function showSingle(id) {
  const d = currentData.find(x => x.id === id);
  if (!d) return;
  const sec = document.getElementById('result-section');
  sec.innerHTML = renderResult(d);
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetSearch() {
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('input-telp').value = '';
  document.getElementById('input-telp').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Enter key
document.getElementById('input-telp').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// Auto-search if ?telp= param in URL
(function() {
  const params = new URLSearchParams(window.location.search);
  const t = params.get('telp');
  if (t) {
    document.getElementById('input-telp').value = t;
    doSearch();
  }
})();
</script>

</body>
</html>
